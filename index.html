<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#352F54" />
    <meta name="format-detection" content="telephone=no" />

    <style>#root { min-height: 100vh; }</style>
    <link rel="preconnect" href="https://api.portalayurveda.com" crossorigin />

    <title>Portal Ayurveda | O maior Portal de Ayurveda do Brasil!</title>
    <meta name="description" content="Faça seu teste de dosha, crie rotinas personalizadas, use nossa assistente Akasha, aqui você encontra conteúdo clínico de qualidade.">
    <meta name="author" content="Portal Ayurveda" />

    <!-- Analytics (GA4, Meta Pixel, Clarity) are loaded after mount via src/components/AnalyticsLoader.tsx -->

    <!-- Favicon e ícones -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Open Graph (sitewide fallback; rotas individuais sobrescrevem via prerender) -->
    <meta property="og:site_name" content="Portal Ayurveda" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:title" content="Portal Ayurveda — Descubra seu Dosha" />
    <meta property="og:description" content="Teste gratuito de dosha, vídeos, artigos, rotinas, alimentação ayurvédica e Akasha IA. Um portal completo de Ayurveda em português." />
    <meta property="og:url" content="https://portalayurveda.com/" />
    <meta property="og:image" content="https://portalayurveda.com/og-image.jpg" />
    <meta property="og:image:secure_url" content="https://portalayurveda.com/og-image.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Portal Ayurveda — Descubra seu Dosha, viva o Ayurveda" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Portal Ayurveda — Descubra seu Dosha" />
    <meta name="twitter:description" content="Teste gratuito de dosha, vídeos, artigos e rotinas ayurvédicas. Conheça-se e viva melhor com o Portal Ayurveda." />
    <meta name="twitter:image" content="https://portalayurveda.com/og-image.jpg" />

    <!-- Fonts servidas localmente via src/styles/fonts.css -->


    <!-- JSON-LD: Organization + WebSite -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Portal Ayurveda",
        "url": "https://portalayurveda.com",
        "logo": "https://portalayurveda.com/icon-512.png",
        "description": "Portal completo de Ayurveda em português: teste de dosha, vídeos, artigos, rotinas, alimentação e a inteligência Akasha.",
        "sameAs": []
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Portal Ayurveda",
        "url": "https://portalayurveda.com",
        "inLanguage": "pt-BR",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://portalayurveda.com/blog?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
  </head>

  <body>
    <!-- SVG clip-path for therapist portal arch (ogival) -->
    <svg width="0" height="0" style="position:absolute">
      <defs>
        <clipPath id="therapist-arch-clip" clipPathUnits="objectBoundingBox">
          <path d="M 0,1 C 0.015,1 0.03,0.985 0.03,0.95 L 0.03,0.4 Q 0.03,0.1 0.5,0 Q 0.97,0.1 0.97,0.4 L 0.97,0.95 C 0.97,0.985 0.985,1 1,1 Z" />
        </clipPath>
      </defs>
    </svg>
    <!-- Meta Pixel (noscript fallback) -->
    <noscript><img height="1" width="1" style="display:none" src="https://www.facebook.com/tr?id=727901213560105&ev=PageView&noscript=1" alt="" /></noscript>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
